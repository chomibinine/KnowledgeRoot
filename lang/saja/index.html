    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f5f3f7; -webkit-tap-highlight-color: transparent; overflow: hidden; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
        
        #cardWrapper { position: relative; width: 100%; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s; }
        .flip-card { perspective: 1000px; width: 100%; height: calc(100vh - 280px); min-height: 520px; max-height: 680px; }
        .flip-card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; }
        .flip-card.flipped .flip-card-inner { transform: rotateY(180deg); }
        
        .flip-card-front, .flip-card-back { 
            position: absolute; width: 100%; height: 100%; 
            -webkit-backface-visibility: hidden; backface-visibility: hidden; 
            border-radius: 2.5rem; display: flex; flex-direction: column; 
            box-shadow: 0 20px 40px -15px rgba(88, 28, 135, 0.15); border: 1px solid #e9d5ff; 
            background: white; overflow: hidden;
        }
        
        .flip-card-front { align-items: center; justify-content: center; padding: 2rem; }
        .flip-card-back { transform: rotateY(180deg); padding: 1.5rem; overflow-y: auto; }

        .slide-in { animation: slideIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1) forwards; }
        @keyframes slideIn { from { transform: scale(0.9) translateY(40px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }

</head>
<body class="text-slate-800 h-screen flex flex-col overflow-hidden select-none">

    <header class="bg-white border-b border-purple-100 shrink-0 px-4 py-4 shadow-sm">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="bg-purple-700 p-2 rounded-xl shadow-lg"><i data-lucide="scroll" class="text-white w-5 h-5"></i></div>
                <h1 class="text-xl font-black text-slate-900 tracking-tight">사자성어 <span class="text-purple-700">뿌리</span></h1>
            </div>
            <button onclick="window.location.href='../../index.html'" class="p-2.5 rounded-xl bg-slate-50 text-slate-400 btn-active hover:text-purple-600 transition-colors">
                <i data-lucide="home" class="w-5 h-5"></i>
            </button>
        </div>
    </header>

    <main id="mainDashboard" class="flex-1 overflow-y-auto p-4 pb-24">
        <div class="max-w-4xl mx-auto">
            <div class="mb-6 flex items-center justify-between bg-white p-6 rounded-[2.2rem] border border-purple-100 shadow-sm">
                <div>
                    <h2 id="totalProgressText" class="text-2xl font-black text-slate-900 leading-none">0% 완료</h2>
                    <span id="wordCountLabel" class="text-[11px] font-bold text-purple-600 uppercase tracking-widest mt-2 block">데이터 불러오는 중...</span>
                </div>
                <button onclick="app.resetHistory()" class="p-2 text-slate-200 active:text-rose-500 transition-colors"><i data-lucide="refresh-cw" class="w-5 h-5"></i></button>
            </div>
            <div id="daysGrid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4"></div>
        </div>
    </main>

    <div id="sessionLayer" class="fixed inset-0 z-[100] bg-white hidden flex flex-col overflow-hidden">
        <div class="bg-white border-b border-slate-100 px-5 py-4 flex justify-between items-center shrink-0">
            <button onclick="app.confirmExit()" class="text-slate-400 p-2 btn-active"><i data-lucide="chevron-left" class="w-8 h-8"></i></button>
            <div class="text-center">
                <span id="sessionDayLabel" class="text-[10px] font-black text-purple-600 uppercase tracking-widest">DAY 01</span>
                <div class="flex bg-slate-100 p-0.5 rounded-lg mt-0.5">
                    <button id="mode-study" onclick="app.switchMode('study')" class="px-5 py-1.5 text-[11px] font-black rounded-md bg-white shadow-sm text-purple-700">학습</button>
                    <button id="mode-quiz" onclick="app.switchMode('quiz')" class="px-5 py-1.5 text-[11px] font-black rounded-md text-slate-400">테스트</button>
                </div>
            </div>
            <div class="text-[11px] font-black min-w-[50px] text-right"><span id="sessionIdx" class="text-purple-700 text-lg">1</span><span class="text-slate-200 mx-1">/</span><span id="sessionTotal" class="text-slate-400">20</span></div>
        </div>

        <div id="sessionContent" class="flex-1 bg-slate-50 flex flex-col p-4 relative" ontouchstart="app.ts(event)" ontouchend="app.te(event)">
            <div id="studyUI" class="flex-1 flex flex-col items-center justify-center w-full max-w-md mx-auto">
                <div id="cardWrapper" class="w-full slide-in">
                    <div class="flip-card cursor-pointer" id="flashcard" onclick="this.classList.toggle('flipped')">
                        <div class="flip-card-inner">
                            <div class="flip-card-front">
                                <h3 id="lReading" class="text-3xl font-black text-purple-600 mb-6 tracking-widest"></h3>
                                <h2 id="lIdiom" class="text-7xl font-black text-slate-900 leading-tight mb-8 tracking-tighter"></h2>
                                <p class="text-slate-300 text-[10px] font-black uppercase tracking-[0.3em] absolute bottom-10">터치하여 뒤집기 / 스와이프 이동</p>
                            </div>
                            <div class="flip-card-back custom-scroll space-y-6">
                                <div class="text-center shrink-0 mb-2 mt-4"><span class="bg-purple-800 text-white px-10 py-4 rounded-[2rem] text-3xl font-black inline-block shadow-xl" id="lMeaning"></span></div>
                                <div id="lHanjaAnalysis" class="flex justify-center gap-2 px-2"></div>
                                <div class="bg-amber-50 p-6 rounded-[2.2rem] border border-amber-100 shrink-0 mx-2">
                                    <p class="text-amber-800 font-black text-[11px] uppercase mb-2 flex items-center gap-1.5"><i data-lucide="sparkles" class="w-4 h-4"></i> 고사 유래 (뿌리 분석)</p>
                                    <p id="lStory" class="text-amber-900 font-bold text-lg leading-relaxed word-keep-all"></p>
                                </div>
                                <div class="bg-white p-5 rounded-[2rem] border border-slate-200 shrink-0 mx-2 mb-4">
                                    <p class="text-slate-400 font-black text-[11px] uppercase mb-2">실전 활용 예시</p>
                                    <p id="lExample" class="text-slate-800 font-black text-xl leading-snug"></p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="mt-8 flex gap-4 w-full">
                    <button onclick="app.navCard(-1)" class="h-16 w-16 bg-white border border-slate-200 rounded-3xl flex items-center justify-center text-slate-400 btn-active shadow-sm"><i data-lucide="chevron-left" class="w-10 h-10"></i></button>
                    <button id="nextBtn" onclick="app.navCard(1)" class="flex-1 h-16 bg-slate-900 text-white rounded-3xl font-black shadow-xl">다음 성어</button>
                </div>
            </div>

            <div id="quizUI" class="hidden flex-1 flex flex-col items-center justify-start w-full max-w-md mx-auto overflow-y-auto pb-10">
                <div class="w-full bg-white rounded-[2.5rem] shadow-xl p-10 mb-6 mt-4 border border-purple-100 text-center relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-full h-1 bg-slate-50"><div id="qBar" class="h-full bg-purple-600 transition-all duration-300"></div></div>
                    <h3 id="qIdiom" class="text-7xl font-black text-slate-900 leading-none mb-8"></h3>
                    <button onclick="document.getElementById('qHint').classList.remove('hidden'); this.classList.add('hidden');" class="mx-auto flex items-center gap-1.5 text-[12px] font-black text-purple-600 bg-purple-50 px-6 py-3 rounded-full"><i data-lucide="lightbulb" class="w-4 h-4"></i> 유래 힌트 보기</button>
                    <div id="qHint" class="hidden mt-6 text-left border-t border-slate-100 pt-6"><p id="qHintStory" class="text-lg font-bold text-amber-900 bg-amber-50 p-4 rounded-2xl leading-relaxed"></p></div>
                </div>
                <div id="qOptions" class="w-full flex flex-col gap-3 shrink-0"></div>
            </div>
        </div>
    </div>

    <!-- 종료 모달 -->
    <div id="exitModal" class="fixed inset-0 z-[200] bg-slate-900/60 backdrop-blur-sm hidden items-center justify-center p-6">
        <div class="bg-white rounded-[2.5rem] p-8 w-full max-w-xs text-center shadow-2xl">
            <h4 class="text-xl font-black text-slate-900 mb-2">학습을 종료할까요?</h4>
            <p class="text-sm text-slate-400 font-medium mb-8">진행 상황이 저장되지 않습니다.</p>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="document.getElementById('exitModal').classList.add('hidden')" class="py-4 bg-slate-100 rounded-2xl font-black text-slate-500 text-sm">계속하기</button>
                <button onclick="app.exitNow()" class="py-4 bg-rose-500 rounded-2xl font-black text-white text-sm">종료</button>
            </div>
        </div>
    </div>

    <script>
        const app = {
            db: [], history: {}, sessionWords: [], sessionIdx: 0,
            score: 0, isAns: false, mode: 'study', tx: 0, currentKey: '',
            async init() {
                this.loadHistory();
                await this.loadData();
                this.ri();
            },
            async loadData() {
                try {
                    let allData = [];
                    // saja_01.json 부터 차례대로 불러와서 합침 (최대 10개 파일)
                    for(let i=1; i<=10; i++) {
                        const fileName = `./saja_${String(i).padStart(2, '0')}.json`;
                        const res = await fetch(fileName);
                        if(res.ok) {
                            const data = await res.json();
                            allData = allData.concat(data);
                        } else {
                            // 404 등 에러 발생 시 파일이 끝났다고 판단하고 중단
                            break;
                        }
                    }
                    
                    if(allData.length === 0) throw new Error("데이터 없음");
                    
                    this.db = allData;
                    document.getElementById('wordCountLabel').textContent = `총 ${this.db.length}개의 성어 활성화됨`;
                    this.renderGrid();
                } catch(e) { 
                    console.error(e);
                    document.getElementById('wordCountLabel').textContent = "데이터 파일 로드 실패"; 
                }
            },
            loadHistory() { 
                const h = localStorage.getItem('saja_history'); 
                if(h) this.history = JSON.parse(h); 
            },
            renderGrid() {
                const grid = document.getElementById('daysGrid'); grid.innerHTML = '';
                const size = 20; const days = Math.ceil(this.db.length / size);
                let completed = 0;
                for(let i=0; i<days; i++){
                    const key = `day${i+1}`;
                    const score = this.history[key];
                    if(score) completed++;
                    const card = document.createElement('div');
                    card.className = "bg-white p-6 rounded-[2.2rem] border border-purple-100 shadow-sm active:scale-95 transition-all text-center cursor-pointer relative overflow-hidden";
                    card.onclick = () => this.startSession(this.db.slice(i*size, (i+1)*size), i+1, key);
                    card.innerHTML = `${score ? '<div class="absolute top-3 right-3 bg-emerald-500 text-white p-1 rounded-full"><i data-lucide="check" class="w-3 h-3"></i></div>' : ''}<div class="w-10 h-10 mx-auto bg-purple-50 rounded-xl flex items-center justify-center text-purple-400 font-black text-xs mb-3">${i+1}</div><h3 class="font-black text-slate-800 text-lg">Day ${i+1}</h3><p class="text-[10px] font-black text-purple-600 mt-1 uppercase">${score || '시작'}</p>`;
                    grid.appendChild(card);
                }
                document.getElementById('totalProgressText').textContent = `${Math.round((completed/days)*100)}% 완료`;
                this.ri();
            },
            startSession(words, dayNum, key) {
                this.sessionWords = words; this.sessionIdx = 0; this.mode = 'study'; this.currentKey = key;
                document.getElementById('sessionLayer').classList.remove('hidden');
                document.getElementById('sessionDayLabel').textContent = `Day ${dayNum}`;
                document.getElementById('sessionTotal').textContent = words.length;
                this.renderStudy();
            },
            renderStudy() {
                const w = this.sessionWords[this.sessionIdx];
                const card = document.getElementById('flashcard');
                card.classList.remove('flipped');
                document.getElementById('sessionIdx').textContent = this.sessionIdx + 1;
                document.getElementById('lIdiom').textContent = w.idiom;
                document.getElementById('lReading').textContent = w.reading;
                document.getElementById('lMeaning').textContent = w.meaning;
                document.getElementById('lStory').textContent = w.etymology.story;
                document.getElementById('lExample').textContent = w.example;
                document.getElementById('lHanjaAnalysis').innerHTML = w.etymology.analysis.map(h => `<div class="flex flex-col items-center"><div class="hanja-box">${h.hanja}</div><span class="text-[10px] font-bold text-slate-400 mt-1">${h.mean}</span></div>`).join('');
                document.getElementById('nextBtn').textContent = this.sessionIdx === this.sessionWords.length - 1 ? "테스트 시작" : "다음 성어";
                this.ri();
            },
            navCard(dir) {
                if(dir === -1 && this.sessionIdx > 0) { this.sessionIdx--; this.renderStudy(); }
                else if(dir === 1) {
                    if(this.sessionIdx < this.sessionWords.length - 1) { this.sessionIdx++; this.renderStudy(); }
                    else { this.switchMode('quiz'); }
                }
            },
            switchMode(m) {
                this.mode = m;
                document.getElementById('studyUI').classList.add('hidden');
                document.getElementById('quizUI').classList.add('hidden');
                document.getElementById(`${m}UI`).classList.remove('hidden');
                if(m === 'quiz') { this.sessionIdx = 0; this.score = 0; this.loadQuiz(); }
            },
            loadQuiz() {
                if(this.sessionIdx >= this.sessionWords.length) return this.showResult();
                this.isAns = false; const w = this.sessionWords[this.sessionIdx];
                document.getElementById('qBar').style.width = `${(this.sessionIdx/this.sessionWords.length)*100}%`;
                document.getElementById('qIdiom').textContent = w.idiom;
                document.getElementById('qHint').classList.add('hidden');
                document.getElementById('qHint').previousElementSibling.classList.remove('hidden');
                document.getElementById('qHintStory').textContent = w.etymology.story;
                const opts = [{t:w.meaning, c:true}, ...this.db.filter(x=>x.meaning!==w.meaning).sort(()=>Math.random()-0.5).slice(0,3).map(x=>({t:x.meaning, c:false}))].sort(()=>Math.random()-0.5);
                const cont = document.getElementById('qOptions'); cont.innerHTML = '';
                opts.forEach(o => {
                    const b = document.createElement('button');
                    b.className = "w-full text-left p-5 rounded-2xl border-2 border-slate-200 bg-white font-black text-slate-700 flex items-center transition-all";
                    b.innerHTML = `<span class="text-xl">${o.t}</span>`;
                    b.onclick = () => { if(this.isAns) return; this.isAns = true; b.className = o.c ? "border-purple-600 bg-purple-50 text-purple-700 w-full text-left p-5 rounded-2xl border-2 flex items-center" : "border-rose-500 bg-rose-50 text-rose-700 w-full text-left p-5 rounded-2xl border-2 flex items-center"; if(o.c) this.score++; setTimeout(() => { this.sessionIdx++; this.loadQuiz(); }, 1000); };
                    cont.appendChild(b);
                });
            },
            showResult() {
                this.history[this.currentKey] = `${this.score}/${this.sessionWords.length}`;
                localStorage.setItem('saja_history', JSON.stringify(this.history));
                this.exitNow();
            },
            confirmExit() { document.getElementById('exitModal').classList.remove('hidden'); },
            exitNow() { document.getElementById('exitModal').classList.add('hidden'); document.getElementById('sessionLayer').classList.add('hidden'); this.renderGrid(); },
            resetHistory() { if(confirm("기록을 삭제할까요?")) { localStorage.removeItem('saja_history'); location.reload(); } },
            ts(e) { this.tx = e.changedTouches[0].screenX; },
            te(e) { const dx = e.changedTouches[0].screenX - this.tx; if(Math.abs(dx) > 60 && this.mode === 'study') { if(dx > 0) this.navCard(-1); else this.navCard(1); } },
            ri() { if(window.lucide) window.lucide.createIcons(); }
        };
        window.onload = () => app.init();
    </script>
</body>
</html>
