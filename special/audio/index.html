<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ASMR 오디오 단어장 Pro | AudioRoot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* overflow: hidden 제거하여 필요시 스크롤 가능하게 변경 */
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #0f172a; -webkit-tap-highlight-color: transparent; overflow-x: hidden; color: #f8fafc; }
        .btn-active:active { transform: scale(0.92); }
        
        /* 모바일에 맞게 디스크 크기 축소 (200px -> 160px) */
        .disc { width: 160px; height: 160px; border-radius: 50%; background: linear-gradient(135deg, #1e293b, #020617); box-shadow: 0 0 40px rgba(99, 102, 241, 0.2), inset 0 0 20px rgba(0,0,0,0.5); border: 2px solid #334155; position: relative; display: flex; justify-content: center; align-items: center; }
        .disc::before { content: ''; position: absolute; width: 40px; height: 40px; border-radius: 50%; background: #0f172a; border: 2px solid #334155; }
        
        .spin { animation: spin 10s linear infinite; }
        .spin-paused { animation-play-state: paused; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .aurora { position: absolute; top: -10%; left: -10%; width: 300px; height: 300px; background: rgba(99, 102, 241, 0.15); filter: blur(100px); border-radius: 50%; z-index: -1; }
        
        .progress-bar-container { width: 100%; height: 6px; background: #334155; border-radius: 4px; overflow: hidden; }
        .progress-bar { height: 100%; background: #818cf8; transition: width 0.3s linear; width: 0%; }
        
        .asmr-btn { transition: all 0.3s; opacity: 0.6; }
        .asmr-btn.active { opacity: 1; background-color: #4f46e5; color: white; border-color: #6366f1; }

        select { background-color: #1e293b; border: 1px solid #334155; border-radius: 8px; font-size: 11px; padding: 4px 8px; outline: none; color: #94a3b8; font-weight: 800; }
        select:focus { border-color: #6366f1; color: white; }
    </style>
</head>
<body class="flex flex-col select-none min-h-screen" onclick="app.initAudioContext()">

    <div class="aurora"></div>

    <header class="border-b border-slate-800 shrink-0 px-4 py-3 relative z-40 bg-slate-900/50 backdrop-blur-md">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="bg-indigo-500/20 p-2 rounded-xl border border-indigo-500/30"><i data-lucide="headphones" class="text-indigo-400 w-4 h-4"></i></div>
                <h1 class="text-md font-black tracking-tight text-white">Audio<span class="text-indigo-400">Root</span></h1>
            </div>
            <button onclick="window.location.href='../../index.html'" class="p-2 rounded-lg bg-slate-800 text-slate-400 btn-active hover:text-indigo-400"><i data-lucide="home" class="w-5 h-5"></i></button>
        </div>
    </header>

    <nav class="bg-slate-900/80 border-b border-slate-800 px-4 py-3 z-30 overflow-x-auto">
        <div class="max-w-md mx-auto flex gap-2 no-scrollbar">
            <select id="courseLevel" onchange="app.applyFilters()">
                <option value="all">전체</option>
                <option value="middle">중학</option>
                <option value="high">고등</option>
            </select>
            <select id="dailyAmount" onchange="app.applyFilters()">
                <option value="10">10개씩</option>
                <option value="20" selected>20개씩</option>
                <option value="30">30개씩</option>
            </select>
            <select id="sortOrder" onchange="app.applyFilters()">
                <option value="root">기본순</option>
                <option value="alpha">A-Z순</option>
            </select>
            <select id="daySelect" onchange="app.loadDay()" class="text-indigo-400 border-indigo-500/30">
                </select>
        </div>
    </nav>

    <main class="flex-1 flex flex-col items-center justify-start p-4 max-w-md mx-auto w-full relative z-10 overflow-y-auto pb-8">
        
        <div class="flex flex-col items-center justify-center w-full mt-2 mb-4">
            <div class="mb-4 relative">
                <div id="disc" class="disc spin spin-paused"></div>
                <div id="statusBadge" class="absolute -bottom-2 left-1/2 -translate-x-1/2 px-3 py-1 bg-slate-800 border border-slate-700 rounded-full text-[9px] font-black tracking-widest text-indigo-400 uppercase">Ready</div>
            </div>
            
            <div class="text-center w-full min-h-[110px] flex flex-col justify-center">
                <h2 id="currentWord" class="text-4xl font-black tracking-tighter mb-1 text-white">Loading...</h2>
                <p id="currentPron" class="text-slate-500 italic mb-2 font-medium text-base"></p>
                <p id="currentMeaning" class="text-xl font-bold text-indigo-300"></p>
            </div>
        </div>

        <div class="w-full bg-slate-800/40 backdrop-blur-xl p-5 rounded-[2rem] border border-slate-700/50 shadow-2xl shrink-0">
            <div class="mb-5">
                <div class="flex justify-between text-[10px] font-bold text-slate-500 mb-2 font-mono uppercase tracking-widest">
                    <span id="currentIndexTxt">0 / 0</span>
                    <span id="statusTxt">Standby</span>
                </div>
                <div class="progress-bar-container">
                    <div id="progressBar" class="progress-bar"></div>
                </div>
            </div>

            <div class="flex items-center justify-center gap-5 mb-6">
                <button onclick="app.prevWord()" class="p-3 text-slate-400 btn-active"><i data-lucide="skip-back" class="w-7 h-7 fill-current"></i></button>
                <button id="playPauseBtn" onclick="app.togglePlay()" class="w-16 h-16 flex items-center justify-center bg-indigo-600 rounded-full shadow-lg text-white btn-active">
                    <i data-lucide="play" class="w-7 h-7 fill-current ml-1" id="playIcon"></i>
                </button>
                <button onclick="app.nextWord()" class="p-3 text-slate-400 btn-active"><i data-lucide="skip-forward" class="w-7 h-7 fill-current"></i></button>
            </div>

            <div>
                <div class="flex justify-between items-end mb-3">
                    <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest">수면 & 백색소음</p>
                    <button id="sleepTimerBtn" onclick="app.toggleSleepTimer()" class="flex items-center gap-1.5 text-[10px] font-bold text-slate-400 bg-slate-800/80 px-3 py-1.5 rounded-full border border-slate-600 btn-active transition-all">
                        <i data-lucide="moon" class="w-3.5 h-3.5"></i> <span id="sleepTimerTxt">타이머 OFF</span>
                    </button>
                </div>
                <div class="flex justify-center gap-2">
                    <button id="asmr-none" onclick="app.setAsmr('none')" class="asmr-btn active flex-1 py-2 bg-slate-700/30 border border-slate-600 rounded-xl text-[10px] font-bold text-slate-400 flex items-center justify-center gap-1.5 btn-active">
                        <i data-lucide="volume-x" class="w-3.5 h-3.5"></i> OFF
                    </button>
                    <button id="asmr-rain" onclick="app.setAsmr('rain')" class="asmr-btn flex-1 py-2 bg-slate-700/30 border border-slate-600 rounded-xl text-[10px] font-bold text-slate-400 flex items-center justify-center gap-1.5 btn-active">
                        <i data-lucide="cloud-rain" class="w-3.5 h-3.5"></i> RAIN
                    </button>
                    <button id="asmr-fire" onclick="app.setAsmr('fire')" class="asmr-btn flex-1 py-2 bg-slate-700/30 border border-slate-600 rounded-xl text-[10px] font-bold text-slate-400 flex items-center justify-center gap-1.5 btn-active">
                        <i data-lucide="flame" class="w-3.5 h-3.5"></i> FIRE
                    </button>
                </div>
            </div>
        </div>
    </main>

    <audio id="audioRain" loop src="https://upload.wikimedia.org/wikipedia/commons/4/4c/Rain_sounds_on_window.ogg"></audio>
    <audio id="audioFire" loop src="https://upload.wikimedia.org/wikipedia/commons/6/67/Fire_cracking_and_popping.ogg"></audio>

    <script>
        const app = {
            fullDb: [], filteredDb: [], currentList: [], idx: 0, 
            isPlaying: false, audioUnlocked: false,
            ttsEn: null, ttsKo: null, playTimeout: null,
            sleepTimerVal: 0, sleepTimeout: null,

            async init() {
                this.setupTTS();
                await this.loadAllData();
                if(window.lucide) window.lucide.createIcons();
            },

            setupTTS() {
                const set = () => {
                    const v = window.speechSynthesis.getVoices();
                    this.ttsEn = v.find(x => x.lang.startsWith('en')) || null;
                    this.ttsKo = v.find(x => x.lang.startsWith('ko')) || null;
                };
                window.speechSynthesis.onvoiceschanged = set; set();
            },

            async loadAllData() {
                this.fullDb = [];
                for(let i=1; i<=20; i++) {
                    try {
                        const res = await fetch(`../../lang/voca/data_part${i}.json`);
                        if(!res.ok) break;
                        const json = await res.json();
                        const words = Array.isArray(json) ? json : (json.words || []);
                        this.fullDb.push(...words);
                    } catch(e) { break; }
                }
                this.fullDb = this.fullDb.filter((v,i,a)=>a.findIndex(t=>t.word===v.word)===i);
                this.applyFilters();
            },

            applyFilters() {
                const lvl = document.getElementById('courseLevel').value;
                const sort = document.getElementById('sortOrder').value;
                const size = parseInt(document.getElementById('dailyAmount').value);

                this.filteredDb = lvl === 'all' ? [...this.fullDb] : this.fullDb.filter(w => w.level === lvl);
                if(sort === 'alpha') this.filteredDb.sort((a,b) => a.word.localeCompare(b.word));

                const daySelect = document.getElementById('daySelect');
                daySelect.innerHTML = '';
                
                const optAll = document.createElement('option');
                optAll.value = 'all'; optAll.textContent = '전체 (수면 모드)';
                daySelect.appendChild(optAll);

                const dayCount = Math.ceil(this.filteredDb.length / size);
                for(let d=1; d<=dayCount; d++) {
                    const opt = document.createElement('option');
                    opt.value = d; opt.textContent = `Day ${d}`;
                    daySelect.appendChild(opt);
                }
                this.loadDay();
            },

            loadDay() {
                const val = document.getElementById('daySelect').value;
                if(val === 'all') {
                    this.currentList = [...this.filteredDb];
                } else {
                    const size = parseInt(document.getElementById('dailyAmount').value);
                    const day = parseInt(val) - 1;
                    this.currentList = this.filteredDb.slice(day * size, (day + 1) * size);
                }
                this.idx = 0;
                this.stopPlay();
                this.updateUI();
            },

            updateUI() {
                if(!this.currentList.length) return;
                const w = this.currentList[this.idx];
                document.getElementById('currentWord').textContent = w.word;
                document.getElementById('currentPron').textContent = w.pronunciation || "";
                document.getElementById('currentMeaning').textContent = w.meaning;
                document.getElementById('currentIndexTxt').textContent = `${this.idx + 1} / ${this.currentList.length}`;
                document.getElementById('progressBar').style.width = `${((this.idx + 1) / this.currentList.length) * 100}%`;
            },

            initAudioContext() {
                if(!this.audioUnlocked) {
                    window.speechSynthesis.speak(new SpeechSynthesisUtterance(""));
                    ['audioRain', 'audioFire'].forEach(id => {
                        const a = document.getElementById(id);
                        a.play().then(()=>a.pause()).catch(e=>{});
                    });
                    this.audioUnlocked = true;
                }
            },

            togglePlay() {
                if(this.isPlaying) this.stopPlay();
                else this.startPlay();
            },

            startPlay() {
                if(!this.currentList.length) return;
                this.isPlaying = true;
                document.getElementById('playPauseBtn').innerHTML = '<i data-lucide="pause" class="w-7 h-7 fill-current"></i>';
                document.getElementById('disc').classList.remove('spin-paused');
                document.getElementById('statusBadge').textContent = 'Playing';
                document.getElementById('statusBadge').classList.replace('text-indigo-400', 'text-emerald-400');
                
                const val = document.getElementById('daySelect').value;
                document.getElementById('statusTxt').textContent = val === 'all' ? 'Sleep Mode' : 'Auto Playing';
                
                if(window.lucide) window.lucide.createIcons();
                this.playSequence();
            },

            stopPlay() {
                this.isPlaying = false;
                document.getElementById('playPauseBtn').innerHTML = '<i data-lucide="play" class="w-7 h-7 fill-current ml-1"></i>';
                document.getElementById('disc').classList.add('spin-paused');
                document.getElementById('statusBadge').textContent = 'Paused';
                document.getElementById('statusBadge').classList.replace('text-emerald-400', 'text-indigo-400');
                document.getElementById('statusTxt').textContent = 'Standby';
                window.speechSynthesis.cancel();
                clearTimeout(this.playTimeout);
                if(window.lucide) window.lucide.createIcons();
            },

            playSequence() {
                if(!this.isPlaying) return;
                window.speechSynthesis.cancel();
                const w = this.currentList[this.idx];
                
                const utEn = new SpeechSynthesisUtterance(w.word);
                if(this.ttsEn) utEn.voice = this.ttsEn;
                utEn.lang = 'en-US'; utEn.rate = 0.8;

                const utKo = new SpeechSynthesisUtterance(w.meaning);
                if(this.ttsKo) utKo.voice = this.ttsKo;
                utKo.lang = 'ko-KR'; utKo.rate = 0.9;

                utEn.onend = () => {
                    this.playTimeout = setTimeout(() => window.speechSynthesis.speak(utKo), 800);
                };

                utKo.onend = () => {
                    this.playTimeout = setTimeout(() => {
                        this.nextWord();
                        if(this.isPlaying) this.playSequence();
                    }, 3000);
                };
                window.speechSynthesis.speak(utEn);
            },

            nextWord() {
                this.idx = (this.idx + 1) % this.currentList.length;
                this.updateUI();
                if(this.isPlaying && !window.speechSynthesis.speaking) this.playSequence();
            },

            prevWord() {
                this.idx = (this.idx - 1 + this.currentList.length) % this.currentList.length;
                this.updateUI();
                if(this.isPlaying && !window.speechSynthesis.speaking) this.playSequence();
            },

            setAsmr(type) {
                const r = document.getElementById('audioRain');
                const f = document.getElementById('audioFire');
                ['none', 'rain', 'fire'].forEach(t => document.getElementById(`asmr-${t}`).classList.remove('active'));
                document.getElementById(`asmr-${type}`).classList.add('active');
                r.pause(); f.pause();
                if(type === 'rain') { r.volume = 0.3; r.play().catch(e=>{}); }
                if(type === 'fire') { f.volume = 0.4; f.play().catch(e=>{}); }
            },

            toggleSleepTimer() {
                const levels = [0, 15, 30, 60, 120];
                let i = levels.indexOf(this.sleepTimerVal);
                this.sleepTimerVal = levels[(i + 1) % levels.length];

                const btn = document.getElementById('sleepTimerBtn');
                const txt = document.getElementById('sleepTimerTxt');
                
                clearTimeout(this.sleepTimeout);

                if (this.sleepTimerVal === 0) {
                    btn.classList.remove('text-indigo-400', 'border-indigo-500/50');
                    btn.classList.add('text-slate-400', 'border-slate-600');
                    txt.textContent = '타이머 OFF';
                } else {
                    btn.classList.add('text-indigo-400', 'border-indigo-500/50');
                    btn.classList.remove('text-slate-400', 'border-slate-600');
                    txt.textContent = `${this.sleepTimerVal}분 후 종료`;

                    this.sleepTimeout = setTimeout(() => {
                        this.stopPlay();
                        this.setAsmr('none');
                        this.sleepTimerVal = 0;
                        btn.classList.remove('text-indigo-400', 'border-indigo-500/50');
                        btn.classList.add('text-slate-400', 'border-slate-600');
                        txt.textContent = '타이머 OFF';
                    }, this.sleepTimerVal * 60 * 1000);
                }
            }
        };

        window.onload = () => app.init();
    </script>
</body>
</html>
