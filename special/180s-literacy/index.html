<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>문해력 Pro v3.0 | Knowledge Root</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root { --vh: 1vh; }
        html, body { height: 100%; height: -webkit-fill-available; margin: 0; padding: 0; overflow: hidden; }
        
        body { 
            font-family: 'Noto Sans KR', sans-serif; background-color: #fdf2f8; 
            height: calc(var(--vh, 1vh) * 100);
            display: flex; flex-direction: column; position: fixed; inset: 0;
            -webkit-tap-highlight-color: transparent;
        }

        .bottom-action-area {
            position: fixed; bottom: 20px; left: 16px; right: 16px; 
            z-index: 1000; display: flex; gap: 12px;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .literacy-card-container {
            position: absolute; top: 70px; left: 16px; right: 16px; 
            bottom: 100px; 
            display: flex; flex-direction: column;
        }

        .literacy-card { 
            flex: 1; border-radius: 2rem; background: white;
            box-shadow: 0 15px 35px -10px rgba(219, 39, 119, 0.2);
            border: 1px solid #fce7f3; overflow: hidden; display: flex; flex-direction: column; padding: 1.5rem;
        }

        .content-text { font-size: 1.1rem; line-height: 1.7; word-break: keep-all; font-weight: 500; color: #1f2937; overflow-y: auto; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #fbcfe8; border-radius: 10px; }
        
        #cardWrapper { height: 100%; display: flex; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .slide-out-left { transform: translateX(-120%) rotate(-5deg); opacity: 0; }
        .slide-out-right { transform: translateX(120%) rotate(5deg); opacity: 0; }
        .btn-active:active { transform: scale(0.92); }
        .animate-shake { animation: shake 0.3s ease-in-out; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }
    </style>
</head>
<body class="text-slate-800">

    <header class="bg-white border-b border-pink-100 px-4 py-3 shrink-0 flex justify-between items-center z-50">
        <div class="flex items-center gap-2">
            <div class="bg-pink-500 p-1.5 rounded-lg"><i data-lucide="zap" class="text-white w-4 h-4"></i></div>
            <h1 class="text-base font-black tracking-tighter">문해력 <span class="text-pink-500">v3.0</span></h1>
        </div>
        <div id="timerDisplay" class="font-mono font-black text-pink-500 text-sm">03:00</div>
        <button onclick="location.href='../../index.html'" class="p-2 bg-slate-50 rounded-lg text-slate-400"><i data-lucide="home" class="w-4 h-4"></i></button>
    </header>

    <main id="mainDashboard" class="flex-1 overflow-y-auto p-4 pb-24 custom-scroll">
        <div class="max-w-md mx-auto">
            <div class="bg-white p-5 rounded-3xl border border-pink-100 shadow-sm mb-4">
                <h2 id="totalProgressText" class="text-xl font-black mb-1">엔진 가동 중...</h2>
                <p id="wordCountLabel" class="text-[11px] font-bold text-pink-500 uppercase tracking-widest animate-pulse">01번 파일 스캔 시작!</p>
            </div>

            <div class="grid grid-cols-2 gap-3 mb-6">
                <div class="bg-white p-3 rounded-2xl border border-slate-200 shadow-sm">
                    <p class="text-[9px] font-black text-slate-400 uppercase mb-1.5 text-center tracking-widest">난이도</p>
                    <select id="filterLevel" onchange="app.applyFilters()" class="w-full bg-transparent font-black text-[13px] outline-none text-center text-slate-700">
                        <option value="all">전체 난이도</option>
                        <option value="middle">중학 수준</option>
                        <option value="high">고등 수준</option>
                    </select>
                </div>
                <div class="bg-white p-3 rounded-2xl border border-slate-200 shadow-sm">
                    <p class="text-[9px] font-black text-slate-400 uppercase mb-1.5 text-center tracking-widest">분야</p>
                    <select id="filterTopic" onchange="app.applyFilters()" class="w-full bg-transparent font-black text-[13px] outline-none text-center text-slate-700">
                        <option value="all">모든 분야</option>
                    </select>
                </div>
            </div>

            <div id="daysGrid" class="grid grid-cols-2 gap-3 pb-10"></div>
        </div>
    </main>

    <div id="sessionLayer" class="fixed inset-0 z-[100] bg-white hidden flex flex-col">
        <div class="px-4 py-3 border-b flex justify-between items-center shrink-0 bg-white">
            <button onclick="app.confirmExit()" class="p-2"><i data-lucide="x" class="w-6 h-6 text-slate-300"></i></button>
            <span id="sessionDayLabel" class="text-[10px] font-black text-pink-500 uppercase tracking-widest">CHAPTER</span>
            <div class="text-[11px] font-black"><span id="sessionIdx" class="text-pink-500">1</span>/5</div>
        </div>

        <div id="sessionContent" class="flex-1 bg-slate-50 relative overflow-hidden" ontouchstart="app.ts(event)" ontouchend="app.te(event)">
            
            <div id="studyUI" class="h-full w-full">
                <div class="literacy-card-container">
                    <div id="cardWrapper">
                        <div class="literacy-card">
                            <div class="flex gap-2 mb-3 shrink-0">
                                <span id="lLevelTag" class="px-2 py-0.5 bg-slate-100 text-slate-500 rounded text-[9px] font-black">고등</span>
                                <span id="lTopicTag" class="px-2 py-0.5 bg-pink-50 text-pink-500 rounded text-[9px] font-black">경제</span>
                            </div>
                            <p id="lContent" class="content-text custom-scroll"></p>
                        </div>
                    </div>
                </div>

                <div class="bottom-action-area">
                    <button onclick="app.navCard(-1)" class="w-16 h-16 bg-white border border-slate-200 rounded-2xl flex items-center justify-center text-slate-300 btn-active shadow-sm"><i data-lucide="chevron-left" class="w-8 h-8"></i></button>
                    <button id="nextBtn" onclick="app.navCard(1)" class="flex-1 h-16 bg-slate-900 text-white rounded-2xl font-black shadow-xl btn-active text-lg">다음 카드</button>
                </div>
            </div>

            <div id="quizUI" class="hidden h-full p-4 overflow-y-auto custom-scroll">
                <div class="bg-white rounded-3xl p-6 shadow-lg border border-pink-100 text-center mb-4">
                    <h3 id="qQuestion" class="text-lg font-black leading-snug word-keep-all"></h3>
                </div>
                <div id="qOptions" class="flex flex-col gap-3 pb-24"></div>
            </div>

            <div id="resultUI" class="hidden inset-0 absolute bg-white flex flex-col items-center justify-center text-center p-8 z-50">
                <div class="w-20 h-20 bg-pink-100 rounded-full flex items-center justify-center mb-4"><i data-lucide="check" class="text-pink-500 w-10 h-10"></i></div>
                <h2 class="text-3xl font-black mb-1">지문 돌파!</h2>
                <p id="resultTime" class="text-pink-500 font-bold mb-8">00:00</p>
                <button onclick="app.exitNow()" class="w-full max-w-xs h-16 bg-slate-900 text-white rounded-2xl font-black shadow-xl">완료</button>
            </div>
        </div>
    </div>

    <div id="exitModal" class="fixed inset-0 z-[200] bg-slate-900/60 backdrop-blur-sm hidden items-center justify-center p-6">
        <div class="bg-white rounded-[2rem] p-6 w-full max-w-[280px] text-center shadow-2xl">
            <h4 class="text-lg font-black mb-6">학습을 중단할까요?</h4>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="document.getElementById('exitModal').classList.add('hidden')" class="py-3 bg-slate-100 rounded-xl font-bold text-slate-400">계속</button>
                <button onclick="app.exitNow()" class="py-3 bg-rose-500 rounded-xl font-bold text-white">중단</button>
            </div>
        </div>
    </div>

    <script>
        function vh() { document.documentElement.style.setProperty('--vh', `${window.innerHeight * 0.01}px`); }
        window.addEventListener('resize', vh); vh();

        const app = {
            fullDb: [], filteredDb: [], history: {}, sessionIdx: 0, mode: 'study',
            async init() { this.loadHistory(); await this.loadData(); if(window.lucide) lucide.createIcons(); },
            
            async loadData() {
                const cb = new Date().getTime();
                const allData = [];
                const label = document.getElementById('wordCountLabel');

                // 🚨 1번부터 25번까지 차례대로 빠르고 안전하게 확인
                for(let i=1; i<=25; i++) {
                    const num = String(i).padStart(2, '0');
                    label.textContent = `스캔 중... [ ${num} / 25 ]`; // 화면에 실시간 진행 상황 표시
                    label.classList.remove('animate-pulse');
                    
                    try {
                        // 1.5초 동안 응답 없으면 강제 종료 (무한 로딩 절대 차단)
                        const controller = new AbortController();
                        const timeoutId = setTimeout(() => controller.abort(), 1500);

                        const res = await fetch(`./literacy_${num}.json?v=${cb}`, { signal: controller.signal });
                        clearTimeout(timeoutId);

                        if(res.ok) {
                            const text = await res.text();
                            try {
                                const json = JSON.parse(text);
                                if(Array.isArray(json)) {
                                    json.forEach(item => { if(!item.level) item.level = 'high'; });
                                    allData.push(...json);
                                }
                            } catch(e) { console.error(`[오류] ${num}번 파일 문법 에러`); }
                        }
                    } catch(e) {
                        // 타임아웃 되거나 없는 파일은 무시하고 쿨하게 다음 파일로 넘어감
                        console.log(`${num}번 파일 패스`);
                    }
                }

                this.fullDb = allData;
                const topics = [...new Set(allData.map(d => d.topic))].filter(Boolean);
                const select = document.getElementById('filterTopic');
                topics.forEach(t => { const o = document.createElement('option'); o.value = t; o.textContent = t; select.appendChild(o); });
                
                label.classList.remove('text-pink-500');
                label.classList.add('text-slate-400');
                this.applyFilters();
            },

            applyFilters() {
                const lvl = document.getElementById('filterLevel').value;
                const top = document.getElementById('filterTopic').value;
                this.filteredDb = this.fullDb.filter(d => (lvl==='all'||d.level===lvl) && (top==='all'||d.topic===top));
                document.getElementById('wordCountLabel').textContent = `로드 완료: 총 ${this.filteredDb.length}개`;
                this.renderGrid();
            },

            loadHistory() { const h = localStorage.getItem('lit_hist'); if(h) this.history = JSON.parse(h); },
            
            renderGrid() {
                const grid = document.getElementById('daysGrid'); grid.innerHTML = '';
                let cleared = 0;
                this.filteredDb.forEach((item, i) => {
                    const key = `lit_${item.title}`;
                    const done = this.history[key]; if(done) cleared++;
                    const card = document.createElement('div');
                    card.className = "bg-white p-4 rounded-3xl border border-pink-50 shadow-sm relative text-center btn-active min-h-[110px] flex flex-col justify-center";
                    card.onclick = () => this.startSession(item, i+1, key);
                    card.innerHTML = `${done?'<div class="absolute top-2 right-2 bg-emerald-500 text-white p-0.5 rounded-full"><i data-lucide="check" class="w-3 h-3"></i></div>':''}
                        <span class="text-[8px] font-black text-pink-300 mb-1 uppercase">${item.topic}</span>
                        <h3 class="text-[13px] font-bold leading-tight word-keep-all">${item.title}</h3>`;
                    grid.appendChild(card);
                });
                document.getElementById('totalProgressText').textContent = `분석률 ${Math.round((cleared/this.filteredDb.length)*100 || 0)}%`;
                if(window.lucide) lucide.createIcons();
            },

            startSession(data, num, key) {
                this.sessionData = data; this.sessionIdx = 0; this.currentKey = key;
                ['studyUI','quizUI','resultUI'].forEach(u=>document.getElementById(u).classList.add('hidden'));
                document.getElementById('studyUI').classList.remove('hidden');
                document.getElementById('sessionLayer').classList.remove('hidden');
                document.getElementById('sessionDayLabel').textContent = `CHAPTER ${num}`;
                document.getElementById('sessionTotal').textContent = data.cards.length;
                this.startTimer(); this.renderStudy();
            },

            startTimer() { this.timer = 180; clearInterval(this.ti); this.ti = setInterval(() => { this.timer--; const m=Math.floor(this.timer/60), s=this.timer%60; document.getElementById('timerDisplay').textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`; if(this.timer<=0){ clearInterval(this.ti); this.exitNow(); } }, 1000); },
            
            renderStudy() {
                document.getElementById('sessionIdx').textContent = this.sessionIdx + 1;
                document.getElementById('lLevelTag').textContent = this.sessionData.level === 'high' ? '고등' : '중학';
                document.getElementById('lTopicTag').textContent = this.sessionData.topic;
                document.getElementById('lContent').textContent = this.sessionData.cards[this.sessionIdx];
                document.getElementById('nextBtn').textContent = this.sessionIdx === this.sessionData.cards.length - 1 ? "이해 확인" : "다음 카드";
            },

            navCard(dir) {
                const el = document.getElementById('cardWrapper');
                if(dir === -1 && this.sessionIdx === 0) return;
                el.classList.add(dir===1 ? 'slide-out-left' : 'slide-out-right');
                setTimeout(() => {
                    if(dir===1 && this.sessionIdx === this.sessionData.cards.length-1) { this.switchQuiz(); }
                    else { this.sessionIdx += dir; this.renderStudy(); }
                    el.className = ''; void el.offsetWidth; el.classList.add('slide-in');
                }, 200);
            },

            switchQuiz() {
                this.mode = 'quiz'; document.getElementById('studyUI').classList.add('hidden');
                document.getElementById('quizUI').classList.remove('hidden');
                const q = this.sessionData.quiz; document.getElementById('qQuestion').textContent = q.question;
                const opts = document.getElementById('qOptions'); opts.innerHTML = '';
                q.options.forEach(o => {
                    const b = document.createElement('button');
                    b.className = "w-full text-left p-4 rounded-2xl border-2 border-slate-100 bg-white font-bold text-slate-600 transition-all active:scale-95";
                    b.textContent = o;
                    b.onclick = () => { if(o === q.answer){ b.classList.add('border-pink-500','bg-pink-50'); setTimeout(()=>this.showRes(), 500); } else { b.classList.add('animate-shake','border-rose-500'); } };
                    opts.appendChild(b);
                });
            },

            showRes() {
                clearInterval(this.ti); document.getElementById('quizUI').classList.add('hidden');
                document.getElementById('resultUI').classList.remove('hidden');
                const elap = 180 - this.timer; document.getElementById('resultTime').textContent = `${Math.floor(elap/60)}분 ${elap%60}초`;
                this.history[this.currentKey] = true; localStorage.setItem('lit_hist', JSON.stringify(this.history));
            },

            ts(e){this.x=e.touches[0].clientX;},
            te(e){const d=e.changedTouches[0].clientX-this.x; if(Math.abs(d)>50) this.navCard(d>0?-1:1);},
            confirmExit(){document.getElementById('exitModal').classList.remove('hidden');},
            exitNow(){clearInterval(this.ti); location.reload();},
            resetHistory(){if(confirm("기록을 삭제할까요?")){localStorage.removeItem('lit_hist'); location.reload();}},
            ri(){if(window.lucide)lucide.createIcons();}
        };
        window.onload = () => app.init();
    </script>
</body>
</html>
