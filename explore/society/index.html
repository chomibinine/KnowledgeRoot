<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>비문학 스캐너 | SocietyRoot - Knowledge Root</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #fffbeb; -webkit-tap-highlight-color: transparent; overflow: hidden; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #fcd34d; border-radius: 10px; }
        
        #cardWrapper { position: relative; width: 100%; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s; }
        .flip-card { perspective: 1000px; width: 100%; height: calc(100vh - 280px); min-height: 520px; max-height: 680px; }
        .flip-card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; }
        .flip-card.flipped .flip-card-inner { transform: rotateY(180deg); }
        
        .flip-card-front, .flip-card-back { 
            position: absolute; width: 100%; height: 100%; 
            -webkit-backface-visibility: hidden; backface-visibility: hidden; 
            border-radius: 2.5rem; display: flex; flex-direction: column; 
            box-shadow: 0 20px 40px -15px rgba(245, 158, 11, 0.15); border: 1px solid #fef3c7; 
            background: white; overflow: hidden;
        }
        
        .flip-card-front { align-items: center; justify-content: center; padding: 2rem; }
        .flip-card-back { transform: rotateY(180deg); padding: 1.5rem; overflow-y: auto; }

        .slide-out-left { transform: translateX(-130%) rotate(-10deg) !important; opacity: 0; transition: transform 0.3s ease-in; }
        .slide-out-right { transform: translateX(130%) rotate(10deg) !important; opacity: 0; transition: transform 0.3s ease-in; }
        .slide-in { animation: slideIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1) forwards; }
        @keyframes slideIn { from { transform: scale(0.9) translateY(40px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }
        .animate-shake { animation: shake 0.3s ease-in-out; }

        .btn-active:active { transform: scale(0.92); }
        .passage-highlight { background-color: #fef08a; padding: 0 4px; border-radius: 4px; font-weight: 700; color: #b45309; }
    </style>
</head>
<body class="text-slate-800 h-screen flex flex-col overflow-hidden select-none">

    <header class="bg-white border-b border-amber-100 shrink-0 px-4 py-4 shadow-sm relative z-40">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="bg-amber-500 p-2 rounded-xl shadow-lg"><i data-lucide="scan-line" class="text-white w-5 h-5"></i></div>
                <h1 class="text-xl font-black text-slate-900 tracking-tight">비문학 <span class="text-amber-500">스캐너</span></h1>
            </div>
            <button onclick="window.location.href='../../index.html'" class="p-2.5 rounded-xl bg-slate-50 text-slate-400 btn-active hover:text-amber-500 transition-colors">
                <i data-lucide="home" class="w-5 h-5"></i>
            </button>
        </div>
    </header>

    <main id="mainDashboard" class="flex-1 overflow-y-auto p-4 pb-24">
        <div class="max-w-4xl mx-auto">
            <div class="mb-6 flex items-center justify-between bg-white p-6 rounded-[2.2rem] border border-amber-100 shadow-sm">
                <div>
                    <h2 id="totalProgressText" class="text-2xl font-black text-slate-900 leading-none">0% 완료</h2>
                    <span id="wordCountLabel" class="text-[11px] font-bold text-amber-500 uppercase tracking-widest mt-2 block">데이터 로드 중...</span>
                </div>
                <button onclick="app.resetHistory()" class="p-2 text-slate-200 active:text-rose-500 transition-colors"><i data-lucide="refresh-cw" class="w-5 h-5"></i></button>
            </div>

            <div class="grid grid-cols-2 gap-3 mb-6">
                <div class="bg-white p-3 rounded-2xl border border-slate-200 shadow-sm">
                    <p class="text-[9px] font-black text-slate-400 uppercase mb-1.5 text-center tracking-widest">분야</p>
                    <select id="courseLevel" onchange="app.renderGrid()" class="w-full bg-transparent font-black text-[15px] outline-none text-center text-slate-700">
                        <option value="all">전체(통합)</option>
                        <option value="economy">경제/금융</option>
                        <option value="law">법학/정치</option>
                    </select>
                </div>
                <div class="bg-white p-3 rounded-2xl border border-slate-200 shadow-sm">
                    <p class="text-[9px] font-black text-slate-400 uppercase mb-1.5 text-center tracking-widest">학습량</p>
                    <select id="dailyAmount" onchange="app.renderGrid()" class="w-full bg-transparent font-black text-[15px] outline-none text-center">
                        <option value="10">10개씩</option>
                        <option value="15" selected>15개씩</option>
                    </select>
                </div>
            </div>

            <div id="daysGrid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4"></div>
        </div>
    </main>

    <div id="sessionLayer" class="fixed inset-0 z-[100] bg-white hidden flex flex-col overflow-hidden">
        <div class="bg-white border-b border-slate-100 px-5 py-4 flex justify-between items-center shrink-0">
            <button onclick="app.confirmExit()" class="text-slate-400 p-2 btn-active"><i data-lucide="chevron-left" class="w-8 h-8"></i></button>
            <div class="text-center">
                <span id="sessionDayLabel" class="text-[10px] font-black text-amber-500 uppercase tracking-widest">DAY 01</span>
                <div class="flex bg-slate-100 p-0.5 rounded-lg mt-0.5">
                    <button id="mode-study" onclick="app.switchMode('study')" class="px-5 py-1.5 text-[11px] font-black rounded-md bg-white shadow-sm text-amber-600 transition-all">개념 학습</button>
                    <button id="mode-quiz" onclick="app.switchMode('quiz')" class="px-5 py-1.5 text-[11px] font-black rounded-md text-slate-400 transition-all">실전 지문</button>
                </div>
            </div>
            <div class="text-[11px] font-black min-w-[50px] text-right"><span id="sessionIdx" class="text-amber-500 text-lg">1</span><span class="text-slate-200 mx-1">/</span><span id="sessionTotal" class="text-slate-400">15</span></div>
        </div>

        <div id="sessionContent" class="flex-1 bg-slate-50 flex flex-col p-4 relative overflow-hidden" ontouchstart="app.ts(event)" ontouchend="app.te(event)">
            
            <div id="studyUI" class="flex-1 flex flex-col items-center justify-center w-full max-w-md mx-auto">
                <div id="cardWrapper" class="w-full slide-in">
                    <div class="flip-card cursor-pointer" id="flashcard" role="button" tabindex="0" onclick="if(!app.isSwiping) this.classList.toggle('flipped')">
                        <div class="flip-card-inner">
                            <div class="flip-card-front text-center">
                                <span id="lCategoryTag" class="px-3 py-1 bg-amber-50 text-amber-600 rounded-lg text-[10px] font-black mb-8 uppercase tracking-widest border border-amber-100">CATEGORY</span>
                                <h2 id="lConcept" class="text-6xl font-black text-slate-900 leading-tight mb-4 tracking-tighter"></h2>
                                <p id="lHanja" class="text-xl font-bold text-slate-400 tracking-widest mb-6"></p>
                                <p class="text-amber-300 text-[10px] font-black uppercase tracking-[0.3em] absolute bottom-10 w-full left-0">터치하여 분석 보기</p>
                            </div>
                            <div class="flip-card-back custom-scroll space-y-6">
                                <div class="bg-amber-50 p-5 rounded-[2rem] border border-amber-100 shrink-0 mt-2">
                                    <p class="text-amber-800 font-black text-[12px] uppercase mb-2">💡 핵심 정의</p>
                                    <p id="lDefinition" class="text-slate-800 font-bold text-lg leading-relaxed word-keep-all"></p>
                                </div>
                                <div class="px-2">
                                    <p class="text-slate-400 font-black text-[11px] uppercase mb-2 flex items-center gap-1.5"><i data-lucide="search" class="w-4 h-4"></i> 어원 및 원리 분석</p>
                                    <p id="lAnalysis" class="text-slate-700 text-[15px] font-medium leading-relaxed bg-slate-50 p-4 rounded-2xl"></p>
                                </div>
                                <div class="bg-white p-5 rounded-[2rem] border border-slate-200 shrink-0 mx-2 mb-4">
                                    <p class="text-slate-400 font-black text-[11px] uppercase mb-2">실전 지문 적용</p>
                                    <p id="lPassage" class="text-slate-600 text-sm leading-relaxed border-l-4 border-amber-400 pl-3"></p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="mt-8 flex gap-4 w-full">
                    <button onclick="app.navCard(-1)" class="h-16 w-16 bg-white border border-slate-200 rounded-3xl flex items-center justify-center text-slate-400 btn-active shadow-sm"><i data-lucide="chevron-left" class="w-10 h-10"></i></button>
                    <button id="nextBtn" onclick="app.navCard(1)" class="flex-1 h-16 bg-slate-900 text-white rounded-3xl font-black shadow-xl">다음 개념</button>
                </div>
            </div>

            <div id="quizUI" class="hidden flex-1 flex flex-col items-center justify-start w-full max-w-md mx-auto overflow-y-auto pb-10">
                <div class="w-full bg-white rounded-[2.5rem] shadow-xl p-8 mb-6 mt-4 border border-amber-100 text-left relative overflow-hidden shrink-0">
                    <div class="absolute top-0 left-0 w-full h-1 bg-slate-50"><div id="qBar" class="h-full bg-amber-500 transition-all duration-300"></div></div>
                    <p class="text-slate-400 font-black text-[11px] uppercase tracking-widest mt-2 mb-4 text-center">지문의 빈칸에 들어갈 개념은?</p>
                    <div class="bg-slate-50 p-5 rounded-2xl border border-slate-100 mb-4">
                        <p id="qPassage" class="text-[15px] font-medium text-slate-700 leading-relaxed word-keep-all"></p>
                    </div>
                    <button onclick="document.getElementById('qHint').classList.remove('hidden'); this.classList.add('hidden');" class="mx-auto flex items-center gap-1.5 text-[12px] font-black text-amber-600 bg-amber-50 px-6 py-3 rounded-full"><i data-lucide="lightbulb" class="w-4 h-4"></i> 뜻풀이 힌트</button>
                    <div id="qHint" class="hidden mt-4 text-center"><p id="qHintDef" class="text-sm font-bold text-amber-800"></p></div>
                </div>
                <div id="qOptions" class="w-full flex flex-col gap-3 shrink-0"></div>
            </div>

            <div id="resultUI" class="hidden flex-1 flex flex-col items-center justify-center text-center p-6 bg-white rounded-[3rem] shadow-sm">
                <div class="w-24 h-24 bg-amber-100 rounded-full flex items-center justify-center mb-6 shadow-inner"><i data-lucide="award" class="text-amber-500 w-12 h-12"></i></div>
                <h2 class="text-4xl font-black text-slate-900 mb-1">스캔 완료!</h2>
                <div class="flex items-baseline justify-center mb-8 gap-1"><span id="fCorrect" class="text-amber-500 text-6xl font-black leading-none">0</span><span class="text-slate-300 text-3xl font-black">/</span><span id="fTotal" class="text-slate-300 text-3xl font-black">15</span></div>
                <div id="wrongReview" class="w-full max-w-xs bg-rose-50 rounded-2xl p-6 border border-rose-100 mb-8 hidden overflow-y-auto max-h-48 text-left"><ul id="wrongList" class="space-y-3"></ul></div>
                <button onclick="app.exitNow()" class="w-full max-w-xs h-16 bg-slate-900 text-white rounded-3xl font-black shadow-xl">목록으로 돌아가기</button>
            </div>
        </div>
    </div>

    <div id="exitModal" class="fixed inset-0 z-[200] bg-slate-900/60 backdrop-blur-sm hidden items-center justify-center p-6">
        <div class="bg-white rounded-[2.5rem] p-8 w-full max-w-xs text-center shadow-2xl">
            <h4 class="text-xl font-black text-slate-900 mb-2">학습을 종료할까요?</h4>
            <div class="grid grid-cols-2 gap-3 mt-8">
                <button onclick="document.getElementById('exitModal').classList.add('hidden')" class="py-4 bg-slate-100 rounded-2xl font-black text-slate-500 text-sm">계속하기</button>
                <button onclick="app.exitNow()" class="py-4 bg-rose-500 rounded-2xl font-black text-white text-sm">종료</button>
            </div>
        </div>
    </div>

    <script>
        const app = {
            db: [], history: {}, sessionWords: [], sessionIdx: 0,
            score: 0, wrongs: [], isAns: false, mode: 'study', tx: 0, ty: 0, isSwiping: false, currentKey: '',
            
            async init() {
                this.loadHistory();
                await this.loadData();
                this.ri();
            },
            
            async loadData() {
                try {
                    let allData = [];
                    for(let i=1; i<=10; i++) {
                        const fileName = `./society_${String(i).padStart(2, '0')}.json`;
                        const res = await fetch(fileName);
                        if(res.ok) {
                            const data = await res.json();
                            allData = allData.concat(data);
                        } else break; 
                    }
                    
                    if(allData.length === 0) {
                        // 더미 데이터 폴백
                        allData = [
                            { id: 1, category: "economy", concept: "기회비용", hanja: "機會費用", definition: "어떤 선택을 함으로써 포기해야 하는 대안들 중에서 가장 가치가 큰 것", analysis: "'기회(Chance)'를 얻기 위해 지불하는 '비용(Cost)'. 눈에 보이는 회계적 비용뿐만 아니라, 포기한 시간과 노력의 가치(암묵적 비용)까지 모두 포함하는 경제학의 가장 기본이 되는 개념입니다.", passage: "합리적인 경제인은 선택을 내릴 때 반드시 [ ? ]을(를) 고려한다. 만약 대학 진학의 [ ? ]이(가) 취업을 통해 얻을 수 있는 평생 소득보다 크다면, 진학하지 않는 것이 합리적이다." },
                            { id: 2, category: "economy", concept: "매몰비용", hanja: "埋沒費用", definition: "이미 지출되어 다시 회수할 수 없는 비용", analysis: "묻힐 매(埋), 가라앉을 몰(沒). 즉, 땅에 묻혀서 사라져버린 돈입니다. 합리적인 의사결정을 위해서는 이 비용을 철저히 무시해야 하지만, 사람들은 본전 생각 때문에 그러지 못하는 '매몰비용의 오류'에 빠지곤 합니다.", passage: "영화를 보다가 너무 재미가 없어도, 이미 지불한 티켓값인 [ ? ]이(가) 아까워서 끝까지 자리를 지키는 것은 비합리적인 행동이다." }
                        ];
                    }
                    
                    this.db = allData;
                    document.getElementById('wordCountLabel').textContent = `총 ${this.db.length}개의 개념 활성화됨`;
                    this.renderGrid();
                } catch(e) { 
                    console.error(e);
                    document.getElementById('wordCountLabel').textContent = "데이터 로드 실패"; 
                }
            },
            
            loadHistory() { const h = localStorage.getItem('society_history'); if(h) this.history = JSON.parse(h); },
            
            renderGrid() {
                const grid = document.getElementById('daysGrid'); grid.innerHTML = '';
                const lvl = document.getElementById('courseLevel').value;
                const size = parseInt(document.getElementById('dailyAmount').value);
                
                let list = lvl === 'all' ? [...this.db] : this.db.filter(w => w.category === lvl);
                if(!list.length) return;
                
                const days = Math.ceil(list.length / size);
                let completed = 0;
                
                const frag = document.createDocumentFragment();
                for(let i=0; i<days; i++){
                    const key = `${lvl}_${size}_${i+1}`;
                    const score = this.history[key];
                    if(score) completed++;
                    const card = document.createElement('div');
                    card.className = "bg-white p-6 rounded-[2.2rem] border border-amber-100 shadow-sm active:scale-95 transition-all text-center cursor-pointer relative overflow-hidden";
                    card.onclick = () => this.startSession(list.slice(i*size, (i+1)*size), i+1, key);
                    card.innerHTML = `${score ? '<div class="absolute top-3 right-3 bg-emerald-500 text-white p-1 rounded-full"><i data-lucide="check" class="w-3 h-3"></i></div>' : ''}<div class="w-10 h-10 mx-auto bg-amber-50 rounded-xl flex items-center justify-center text-amber-500 font-black text-xs mb-3">${i+1}</div><h3 class="font-black text-slate-800 text-lg">Day ${i+1}</h3><p class="text-[10px] font-black text-amber-600 mt-1 uppercase">${score || '시작'}</p>`;
                    frag.appendChild(card);
                }
                grid.appendChild(frag);
                
                document.getElementById('totalProgressText').textContent = `${days > 0 ? Math.round((completed/days)*100) : 0}% 완료`;
                this.ri();
            },
            
            ts(e) { this.tx = e.changedTouches[0].screenX; this.ty = e.changedTouches[0].screenY; this.isSwiping = false; },
            te(e) { 
                const dx = e.changedTouches[0].screenX - this.tx; 
                const dy = e.changedTouches[0].screenY - this.ty;
                if(Math.abs(dx) > 60 && Math.abs(dy) < 100 && this.mode === 'study') { 
                    this.isSwiping = true;
                    if(dx > 0) this.navCard(-1); else this.navCard(1); 
                } 
            },
            
            navCard(dir) {
                const wrap = document.getElementById('cardWrapper');
                if(dir === -1 && this.sessionIdx === 0) return;
                
                const outClass = dir === 1 ? 'slide-out-left' : 'slide-out-right';
                wrap.classList.remove('slide-in');
                wrap.classList.add(outClass);
                
                setTimeout(() => {
                    if(dir === -1) { this.sessionIdx--; this.renderStudy(); }
                    else if(dir === 1) {
                        if(this.sessionIdx < this.sessionWords.length - 1) { this.sessionIdx++; this.renderStudy(); }
                        else { wrap.classList.remove(outClass); this.switchMode('quiz'); return; }
                    }
                    wrap.classList.remove(outClass);
                    void wrap.offsetWidth; 
                    wrap.classList.add('slide-in');
                }, 300);
            },
            
            startSession(words, dayNum, key) {
                this.sessionWords = words; this.sessionIdx = 0; this.mode = 'study'; this.currentKey = key;
                document.getElementById('sessionLayer').classList.remove('hidden');
                document.getElementById('sessionDayLabel').textContent = `Day ${dayNum}`;
                document.getElementById('sessionTotal').textContent = words.length;
                this.renderStudy();
            },
            
            renderStudy() {
                const w = this.sessionWords[this.sessionIdx];
                const card = document.getElementById('flashcard');
                card.classList.remove('flipped');
                document.getElementById('sessionIdx').textContent = this.sessionIdx + 1;
                
                const catName = w.category === 'economy' ? '경제/금융' : (w.category === 'law' ? '법/정치' : '사회통합');
                document.getElementById('lCategoryTag').textContent = catName;
                document.getElementById('lConcept').textContent = w.concept;
                document.getElementById('lHanja').textContent = w.hanja;
                document.getElementById('lDefinition').textContent = w.definition;
                document.getElementById('lAnalysis').textContent = w.analysis;
                
                // 지문에서 [ ? ] 부분을 강조 처리
                const highlightPassage = w.passage.replace(/\[ \? \]/g, `<span class="passage-highlight">${w.concept}</span>`);
                document.getElementById('lPassage').innerHTML = highlightPassage;
                
                document.getElementById('nextBtn').textContent = this.sessionIdx === this.sessionWords.length - 1 ? "실전 지문 테스트" : "다음 개념";
                this.ri();
            },
            
            switchMode(m) {
                this.mode = m;
                ['studyUI', 'quizUI', 'resultUI'].forEach(ui => document.getElementById(ui).classList.add('hidden'));
                document.getElementById(`${m}UI`).classList.remove('hidden');
                if(m === 'quiz') { this.sessionIdx = 0; this.score = 0; this.wrongs = []; this.loadQuiz(); }
                else if(m === 'study') { this.sessionIdx = 0; this.renderStudy(); }
            },
            
            loadQuiz() {
                if(this.sessionIdx >= this.sessionWords.length) return this.showResult();
                this.isAns = false; 
                const w = this.sessionWords[this.sessionIdx];
                document.getElementById('sessionIdx').textContent = this.sessionIdx + 1;
                document.getElementById('qBar').style.width = `${(this.sessionIdx/this.sessionWords.length)*100}%`;
                
                document.getElementById('qPassage').innerHTML = w.passage.replace(/\[ \? \]/g, `<span class="text-amber-600 font-black"> [ &nbsp;&nbsp;?&nbsp;&nbsp; ] </span>`);
                
                const hintBtn = document.getElementById('qHint').previousElementSibling;
                hintBtn.classList.remove('hidden');
                document.getElementById('qHint').classList.add('hidden');
                document.getElementById('qHintDef').textContent = w.definition;
                
                const cont = document.getElementById('qOptions'); 
                cont.innerHTML = '';
                
                const opts = [{t:w.concept, c:true}, ...this.db.filter(x=>x.concept!==w.concept).sort(()=>Math.random()-0.5).slice(0,3).map(x=>({t:x.concept, c:false}))].sort(()=>Math.random()-0.5);
                
                const frag = document.createDocumentFragment();
                opts.forEach(o => {
                    const b = document.createElement('button');
                    b.className = "w-full text-left p-5 rounded-2xl border-2 border-slate-200 bg-white font-black text-slate-700 text-lg transition-all flex items-center";
                    b.innerHTML = `<span>${o.t}</span>`;
                    b.onclick = () => { 
                        if(this.isAns) return; 
                        this.isAns = true; 
                        
                        if(o.c) {
                            b.className = "w-full text-left p-5 rounded-2xl border-2 border-amber-500 bg-amber-50 text-amber-700 text-lg font-black flex items-center"; 
                            this.score++; 
                            setTimeout(() => { this.sessionIdx++; this.loadQuiz(); }, 600); 
                        } else {
                            b.className = "w-full text-left p-5 rounded-2xl border-2 border-rose-500 bg-rose-50 text-rose-700 text-lg font-black flex items-center animate-shake"; 
                            this.wrongs.push(w);
                            setTimeout(() => { this.sessionIdx++; this.loadQuiz(); }, 1000); 
                        }
                    };
                    frag.appendChild(b);
                });
                cont.appendChild(frag);
            },
            
            showResult() {
                this.mode = 'result'; 
                ['studyUI', 'quizUI', 'resultUI'].forEach(ui => document.getElementById(ui).classList.add('hidden'));
                document.getElementById('resultUI').classList.remove('hidden');
                
                document.getElementById('fCorrect').textContent = this.score;
                document.getElementById('fTotal').textContent = this.sessionWords.length;
                this.history[this.currentKey] = `${this.score}/${this.sessionWords.length}`;
                localStorage.setItem('society_history', JSON.stringify(this.history));
                
                const list = document.getElementById('wrongList'); list.innerHTML = '';
                if(this.wrongs.length > 0) {
                    document.getElementById('wrongReview').classList.remove('hidden');
                    list.innerHTML = this.wrongs.map(w => `<li class="bg-white p-4 rounded-xl border border-rose-100"><p class="font-black text-slate-800 text-lg mb-1">${w.concept}</p><p class="text-rose-500 text-[12px] font-bold mt-1">${w.definition}</p></li>`).join('');
                }
                this.ri();
            },
            
            confirmExit() { document.getElementById('exitModal').classList.remove('hidden'); },
            exitNow() { document.getElementById('exitModal').classList.add('hidden'); document.getElementById('sessionLayer').classList.add('hidden'); this.renderGrid(); },
            resetHistory() { if(confirm("기록을 삭제할까요?")) { localStorage.removeItem('society_history'); location.reload(); } },
            ri() { if(window.lucide) window.lucide.createIcons(); }
        };
        window.onload = () => app.init();
    </script>
</body>
</html>
